<script type="module">
  import { initializeApp } from "https://www.gstatic.com";
  import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com";

  const firebaseConfig = {
    apiKey: "AIzaSyB8emEQNjFrizdvb6i2jftipgKROB_T6Q4",
    authDomain: "briz-messenger.firebaseapp.com",
    projectId: "briz-messenger",
    storageBucket: "briz-messenger.firebasestorage.app",
    messagingSenderId: "334191649483",
    appId: "1:334191649483:web:741fd0808907b3e0a6b14e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // This "onSnapshot" makes the timeline update INSTANTLY
  onSnapshot(collection(db, "posts"), (querySnapshot) => {
    let feedHTML = "";
    querySnapshot.forEach((doc) => {
      const data = doc.data();
      feedHTML += `
        <div class="post">
          <span class="badge">✓ ${data.status || 'Verified User'}</span>
          <div style="font-weight:bold; color: #000;">${data.author}</div>
          <div class="content">${data.content}</div>
          <div style="font-size:0.7rem; color:gray;">${data.timestamp ? data.timestamp.toDate().toLocaleString() : ''}</div>
        </div>`;
    });
    document.getElementById("feed").innerHTML = feedHTML || "No posts yet. Start the interaction, CEO!";
  }, (error) => {
    document.getElementById("feed").innerHTML = "Error: " + error.message;
  });
</script>
